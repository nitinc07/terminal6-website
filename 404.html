<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Page Not Found — Terminal6</title>
<style>
:root {
  --bg: #FAFAF8; --text: #1C1917; --text-mid: #57534E;
  --accent: #C2410C; --border: #E7E5E4;
  --serif: 'Source Serif 4', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans); background: var(--bg); color: var(--text);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 32px;
}
h1 {
  font-family: var(--serif); font-size: 72px; font-weight: 700;
  color: var(--border); margin-bottom: 16px;
}
p { font-size: 17px; color: var(--text-mid); margin-bottom: 32px; }
a {
  display: inline-block; padding: 12px 28px;
  background: var(--text); color: var(--bg); font-size: 14px;
  font-weight: 600; border-radius: 6px; text-decoration: none;
  transition: background 0.2s;
}
a:hover { background: var(--accent); }
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <p>This page doesn't exist.</p>
  <a href="/">Back to Terminal6</a>
</div>
</body>
</html>
