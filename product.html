<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Terminal6 — Product Detail</title>
<script>
(function(){
  const saved=sessionStorage.getItem('t6_user');
  if(!saved){location.replace('/home.html');document.documentElement.style.display='none';}
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css?v=2026-04-21b">
<style>
/* ── Seller Central-inspired product detail page ── */

/* Layout: left sidebar + right content */
.pd-layout{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:100vh}
@media(max-width:900px){.pd-layout{grid-template-columns:1fr;}}

/* ── LEFT SIDEBAR ── */
.pd-side{background:var(--bg-white);border-right:1px solid var(--border);padding:24px 20px;position:sticky;top:0;height:100vh;overflow-y:auto}
.pd-back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--tm);text-decoration:none;margin-bottom:16px;font-weight:500}
.pd-back:hover{text-decoration:underline}
.pd-side-img{width:120px;height:120px;border-radius:var(--rad);border:1px solid var(--border-s);object-fit:contain;background:var(--bg-cream);display:block;margin:0 auto 14px}
.pd-side-img-ph{width:120px;height:120px;border-radius:var(--rad);border:1px solid var(--border);background:var(--bg-cream);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:32px;margin:0 auto 14px}

/* Status badge */
.pd-status{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:4px;margin-bottom:10px}
.pd-status.active{background:var(--gl);color:var(--g)}
.pd-status.inactive{background:var(--al);color:var(--a)}
.pd-status.suppressed{background:var(--rl);color:var(--r)}

/* SKU/ASIN identifiers */
.pd-ids{font-size:11.5px;color:var(--t2);line-height:1.8;margin-bottom:16px}
.pd-ids .lbl{color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
.pd-ids .val{font-family:var(--mono);font-weight:500;color:var(--t1)}
.pd-ids a{color:var(--acc-t);text-decoration:none}
.pd-ids a:hover{text-decoration:underline}

/* Sidebar nav */
.pd-nav{border-top:1px solid var(--border);padding-top:14px;margin-top:14px}
.pd-nav a{display:block;padding:7px 10px;font-size:13px;color:var(--tm);text-decoration:none;border-radius:var(--rs);font-weight:500;margin-bottom:2px}
.pd-nav a:hover{background:var(--bg-cream)}
.pd-nav a.act{background:var(--bg-cream);color:var(--t1);font-weight:600;border-left:3px solid var(--acc)}

/* Channel tags in sidebar */
.pd-ch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.pd-ch-tag{font-size:9px;font-weight:600;color:#fff;padding:2px 7px;border-radius:3px}
.pd-ch-tag.amz{background:#FF9900}
.pd-ch-tag.shp{background:#96bf48}
.pd-ch-tag.fk{background:#2874f0}
.pd-ch-tag.myn{background:#ff3f6c}
.pd-ch-tag.other{background:#999}

/* ── RIGHT CONTENT ── */
.pd-main{padding:24px 32px;max-width:900px}

/* Product title bar */
.pd-title-bar{margin-bottom:24px}
.pd-title{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--t1);line-height:1.3;margin:0 0 6px}

/* Anomaly alerts */
.pd-alerts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.pd-alert{padding:10px 14px;border-radius:var(--rad);font-size:12.5px;display:flex;align-items:center;gap:8px}
.pd-alert.red{background:var(--rl);color:var(--r);border:1px solid var(--r)}
.pd-alert.amber{background:#FFF4E5;color:#B8860B;border:1px solid #E8C547}

/* Section container — matches Seller Central card style */
.pd-card{background:var(--bg-white);border:1px solid var(--border-s);border-radius:var(--rad);padding:20px 22px;margin-bottom:20px;box-shadow:var(--sh)}
.pd-card-h{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--t1);margin:0 0 4px;display:flex;align-items:center;justify-content:space-between}
.pd-card-sub{font-size:11px;color:var(--t3);margin-bottom:16px}

/* Multi-period KPI grid (like Seller Central sales header) */
.kpi-periods{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1px solid var(--border);border-radius:var(--rad);overflow:hidden;margin-bottom:16px}
.kpi-period{padding:12px 16px;border-right:1px solid var(--border);text-align:center}
.kpi-period:last-child{border-right:none}
.kpi-period .per-label{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px}
.kpi-period .per-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.kpi-period .per-row .lbl{color:var(--t3)}
.kpi-period .per-row .val{font-family:var(--mono);font-weight:600;color:var(--t1)}

/* BSR badge */
.bsr-badge{display:inline-block;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1);padding:4px 12px;border:1px solid var(--border);border-radius:var(--rad);background:var(--bg-cream)}

/* Sales chart area */
.chart-area{position:relative;height:180px;margin:16px 0 8px;border:1px solid var(--bg-cream);border-radius:var(--rad);overflow:hidden;background:var(--bg-white)}
.chart-svg{width:100%;height:100%}

/* Pricing panel */
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.price-col h4{font-size:13px;font-weight:600;color:var(--t1);margin:0 0 10px}
.price-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--bg-cream)}
.price-row:last-child{border:none}
.price-row .lbl{color:var(--t3)}
.price-row .val{font-family:var(--mono);font-weight:600;color:var(--t1)}
.price-row .val.green{color:var(--g)}

/* Inventory panel — matches Seller Central layout */
.inv-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.inv-col h4{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.3px;margin:0 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.inv-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px}
.inv-row .lbl{color:var(--t3)}
.inv-row .val{font-family:var(--mono);font-weight:500;color:var(--t1)}
.inv-row .val.zero{color:var(--t3)}
.inv-row .val.warn{color:var(--r);font-weight:600}

/* P&L waterfall bar chart */
.wf-bar{display:flex;align-items:flex-end;gap:4px;height:120px;padding:8px 0;margin-bottom:8px}
.wf-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.wf-col .bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.wf-col .bar.pos{background:var(--g)}
.wf-col .bar.neg{background:var(--r)}
.wf-col .bar.neutral{background:var(--border)}
.wf-col .wf-lbl{font-size:8.5px;color:var(--t3);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.wf-col .wf-amt{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--t1);text-align:center}

/* Ads cards */
.ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:14px}
.ad-card{background:var(--bg-cream);border-radius:var(--rad);padding:12px 14px}
.ad-card .ad-type{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--t2);margin-bottom:8px;letter-spacing:.3px}
.ad-card .ad-row{display:flex;justify-content:space-between;font-size:11.5px;padding:2px 0}
.ad-card .ad-row .lbl{color:var(--t3)}
.ad-card .ad-row .val{font-family:var(--mono);font-weight:500;color:var(--t1)}

/* SERP rank badges */
.rk{display:inline-block;min-width:28px;text-align:center;padding:3px 8px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:600}
.rk.top{background:var(--gl);color:var(--g)}
.rk.ok{background:#FFF8E1;color:#B8860B}
.rk.low{background:var(--al);color:var(--a)}
.rk.none{background:var(--bg-cream);color:var(--t3);font-weight:400}

/* Reviews */
.rv-header{display:flex;gap:20px;align-items:center;margin-bottom:16px}
.rv-avg{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--t1);line-height:1}
.rv-avg-sub{font-size:11px;color:var(--t3);margin-top:4px}
.rv-bars{flex:1;max-width:240px}
.rv-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.rv-bar-row .star{font-size:11px;color:var(--t2);width:16px;text-align:right}
.rv-bar-row .bar{flex:1;height:8px;background:var(--bg-cream);border-radius:4px;overflow:hidden}
.rv-bar-row .bar .fill{height:100%;background:var(--a);border-radius:4px}
.rv-bar-row .cnt{font-size:10px;color:var(--t3);width:24px;font-family:var(--mono)}
.rv-card{background:var(--bg-cream);border-radius:var(--rad);padding:12px 14px;margin-bottom:8px}
.rv-card-head{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rv-stars{color:var(--a);font-size:12px;letter-spacing:1px}
.rv-card-date{font-size:10.5px;color:var(--t3)}
.rv-card-title{font-weight:600;font-size:13px;color:var(--t1);margin-bottom:3px}
.rv-card-body{font-size:12px;color:var(--t2);line-height:1.5}
.rv-themes{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.rv-theme{font-size:10px;padding:2px 8px;border-radius:8px;background:var(--bg-white);color:var(--t2)}

/* Content health bar */
.cs-bar{height:6px;border-radius:3px;background:var(--bg-cream);overflow:hidden;margin-top:4px}
.cs-fill{height:100%;border-radius:3px}

/* Variants table */
.var-tbl{width:100%;border-collapse:collapse;font-size:12px}
.var-tbl th{text-align:left;font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;padding:6px 8px;border-bottom:1px solid var(--border)}
.var-tbl td{padding:6px 8px;border-bottom:1px solid var(--bg-cream);color:var(--t2)}
.var-tbl .vi{width:32px;height:32px;border-radius:4px;object-fit:contain;background:var(--bg-cream)}

@media(max-width:900px){
  .pd-side{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border)}
  .pd-main{padding:16px}
  .kpi-periods{grid-template-columns:1fr}
  .kpi-period{border-right:none;border-bottom:1px solid var(--border)}
  .kpi-period:last-child{border-bottom:none}
  .inv-grid{grid-template-columns:1fr}
  .price-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<script>
(function(){
  var h = location.hostname, parts = h.split('.');
  if(parts.length >= 3 && parts[1] === 'terminal6' && parts[0] !== 'www' && parts[0] !== 'dev')
    window.T6_BRAND_SLUG = parts[0];
  else if(parts.length >= 4 && parts[0] === 'dev')
    window.T6_BRAND_SLUG = parts[1];
  else window.T6_BRAND_SLUG = 'basil';
})();
</script>
<script src="/shared.js?v=2026-04-21b"></script>

<div id="pd-loading" style="padding:60px;text-align:center" class="loading">Loading product...</div>
<div id="pd-error" style="display:none;padding:60px"></div>

<div class="pd-layout" id="pd-layout" style="display:none">

  <!-- LEFT SIDEBAR -->
  <aside class="pd-side">
    <a class="pd-back" id="backLink" href="javascript:history.back()">&larr; Back</a>
    <div id="pd-side-img"></div>
    <div id="pd-side-status"></div>
    <div class="pd-ch-tags" id="pd-ch-tags"></div>
    <div class="pd-ids" id="pd-ids"></div>

    <nav class="pd-nav" id="pd-nav">
      <a href="#sec-sales" class="act">Sales</a>
      <a href="#sec-pricing">Pricing</a>
      <a href="#sec-inventory">Inventory</a>
      <a href="#sec-pnl">SKU Economics</a>
      <a href="#sec-ads">Ads</a>
      <a href="#sec-serp">SERP</a>
      <a href="#sec-reviews">Reviews</a>
      <a href="#sec-returns">Returns</a>
      <a href="#sec-content">Content Health</a>
    </nav>
  </aside>

  <!-- RIGHT CONTENT -->
  <main class="pd-main">
    <div class="pd-title-bar">
      <h1 class="pd-title" id="pd-title">--</h1>
    </div>

    <div class="pd-alerts" id="pd-alerts"></div>

    <!-- SALES -->
    <div class="pd-card" id="sec-sales">
      <div class="pd-card-h">Sales</div>
      <div class="pd-card-sub" id="sales-sub"></div>
      <div id="sales-kpis"></div>
      <div id="sales-bsr" style="margin-bottom:14px"></div>
      <div class="chart-area" id="sales-chart"></div>
      <div id="sales-table"></div>
    </div>

    <!-- PRICING -->
    <div class="pd-card" id="sec-pricing">
      <div class="pd-card-h">Pricing</div>
      <div class="pd-card-sub" id="pricing-sub"></div>
      <div id="pricing-content"></div>
    </div>

    <!-- INVENTORY -->
    <div class="pd-card" id="sec-inventory">
      <div class="pd-card-h">Inventory</div>
      <div class="pd-card-sub" id="inv-sub"></div>
      <div id="inv-content"></div>
    </div>

    <!-- SKU ECONOMICS / P&L -->
    <div class="pd-card" id="sec-pnl">
      <div class="pd-card-h">SKU Economics</div>
      <div class="pd-card-sub" id="pnl-sub"></div>
      <div id="pnl-content"></div>
    </div>

    <!-- ADS -->
    <div class="pd-card" id="sec-ads" style="display:none">
      <div class="pd-card-h">Ads Performance</div>
      <div class="pd-card-sub" id="ads-sub"></div>
      <div id="ads-content"></div>
    </div>

    <!-- SERP -->
    <div class="pd-card" id="sec-serp" style="display:none">
      <div class="pd-card-h">SERP Rankings</div>
      <div class="pd-card-sub"></div>
      <div id="serp-content"></div>
    </div>

    <!-- REVIEWS -->
    <div class="pd-card" id="sec-reviews" style="display:none">
      <div class="pd-card-h">Reviews</div>
      <div class="pd-card-sub" id="reviews-sub"></div>
      <div id="reviews-content"></div>
    </div>

    <!-- RETURNS -->
    <div class="pd-card" id="sec-returns" style="display:none">
      <div class="pd-card-h">Returns</div>
      <div class="pd-card-sub" id="returns-sub"></div>
      <div id="returns-content"></div>
    </div>

    <!-- CONTENT HEALTH -->
    <div class="pd-card" id="sec-content" style="display:none">

      <div class="pd-card-h">Variants</div>

  </main>
</div>

<script>
(function(){
  'use strict';
  var params = new URLSearchParams(location.search);
  var mskuId = params.get('msku');
  var skuFilter = params.get('sku') || '';
  var days = parseInt(params.get('days') || '30', 10);
  var slug = window.T6_BRAND_SLUG || 'basil';
  document.getElementById('backLink').href = '/' + slug + '.html';

  if(!mskuId){
    document.getElementById('pd-loading').style.display='none';
    document.getElementById('pd-error').style.display='block';
    document.getElementById('pd-error').innerHTML='<div class="error">No product specified. Use ?msku=&lt;id&gt;</div>';
    return;
  }

  // Sidebar nav — smooth scroll + highlight
  document.querySelectorAll('.pd-nav a').forEach(function(a){
    a.addEventListener('click', function(e){
      e.preventDefault();
      var target = document.querySelector(this.getAttribute('href'));
      if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
      document.querySelectorAll('.pd-nav a').forEach(function(n){ n.classList.remove('act'); });
      this.classList.add('act');
    });
  });

  var apiUrl = '/v1/products/'+mskuId+'?days='+days;
  if(skuFilter) apiUrl += '&sku='+encodeURIComponent(skuFilter);

  api(apiUrl).then(render).catch(function(e){
    document.getElementById('pd-loading').style.display='none';
    document.getElementById('pd-error').style.display='block';
    document.getElementById('pd-error').innerHTML='<div class="error">'+(e.message||e)+'</div>';
  });

  function render(d){
    document.getElementById('pd-loading').style.display='none';
    document.getElementById('pd-layout').style.display='grid';

    var p = d.product;
    document.title = 'Terminal6 \u2014 '+(p.product_name||p.sku_code);

    // ── SIDEBAR ──
    renderSidebar(d);

    // ── TITLE ──
    document.getElementById('pd-title').textContent = p.product_name || p.sku_code;

    // ── ALERTS ──
    renderAlerts(d.anomalies);

    // ── SALES ──
    renderSales(d);

    // ── PRICING ──
    renderPricing(d);

    // ── INVENTORY ──
    renderInventory(d);

    // ── P&L / SKU ECONOMICS ──
    renderPnL(d);

    // ── ADS ──
    if(d.ads && d.ads.length > 0){
      document.getElementById('sec-ads').style.display='block';
      renderAds(d);
    }

    // ── SERP ──
    if(d.serp && d.serp.length > 0){
      document.getElementById('sec-serp').style.display='block';
      renderSERP(d.serp);
    }

    // ── REVIEWS ──
    if((d.reviews && d.reviews.length > 0) || (d.review_summary && d.review_summary.total > 0)){
      document.getElementById('sec-reviews').style.display='block';
      renderReviews(d);
    }

    // ── RETURNS ──
    if(d.returns && d.returns.length > 0){
      document.getElementById('sec-returns').style.display='block';
      renderReturns(d);
    }

    // ── CONTENT HEALTH ──
    if(d.listing_health && d.listing_health.length > 0){
      document.getElementById('sec-content').style.display='block';
      renderContentHealth(d.listing_health);
    }

    // ── VARIANTS ──
    if(d.variants && d.variants.length > 0){
      document.getElementById('sec-variants').style.display='block';
      renderVariants(d.variants);
    }

    // Hide empty nav items
    if(!d.ads || !d.ads.length) hideNav('#sec-ads');
    if(!d.serp || !d.serp.length) hideNav('#sec-serp');
    if((!d.reviews || !d.reviews.length) && (!d.review_summary || !d.review_summary.total)) hideNav('#sec-reviews');
    if(!d.returns || !d.returns.length) hideNav('#sec-returns');
    if(!d.listing_health || !d.listing_health.length) hideNav('#sec-content');
  }

  function hideNav(href){
    var a = document.querySelector('.pd-nav a[href="'+href+'"]');
    if(a) a.style.display='none';
  }

  /* ─────────── SIDEBAR ─────────── */
  function renderSidebar(d){
    var p = d.product;
    var imgEl = document.getElementById('pd-side-img');
    if(p.image_url) imgEl.innerHTML='<img class="pd-side-img" src="'+p.image_url+'" alt="">';
    else imgEl.innerHTML='<div class="pd-side-img-ph">&#128230;</div>';

    // Status
    var st = 'active', stLabel = 'ACTIVE';
    if(d.listing_health && d.listing_health.length){
      var lh0 = d.listing_health[0];
      if(lh0.amz_suppressed){ st='suppressed'; stLabel='SUPPRESSED'; }
      else if(lh0.amz_status==='Inactive'){ st='inactive'; stLabel='INACTIVE'; }
    }
    document.getElementById('pd-side-status').innerHTML='<span class="pd-status '+st+'">'+stLabel+'</span>';

    // Channel tags
    var chSet = {};
    d.channels.forEach(function(c){ chSet[c.channel]=true; });
    var tagMap = {AMAZON_IN:['AMZ','amz'],SHOPIFY:['SHP','shp'],FLIPKART_IN:['FK','fk'],MYNTRA:['MYN','myn']};
    var tagsHtml = '';
    Object.keys(chSet).forEach(function(ch){
      var m = tagMap[ch] || [ch,'other'];
      tagsHtml += '<span class="pd-ch-tag '+m[1]+'">'+m[0]+'</span>';
    });
    document.getElementById('pd-ch-tags').innerHTML = tagsHtml;

    // Identifiers
    var ids = '';
    ids += '<div><span class="lbl">SKU</span> <span class="val">'+esc(p.sku_code)+'</span></div>';
    var amzCl = d.channels.find(function(c){ return c.channel==='AMAZON_IN'; });
    if(amzCl){
      ids += '<div><span class="lbl">ASIN</span> <span class="val">'+esc(amzCl.channel_sku_id||'--')+'</span></div>';
      ids += '<div><span class="lbl">Seller SKU</span> <span class="val">'+esc(amzCl.seller_sku||'--')+'</span></div>';
      if(amzCl.parent_asin) ids += '<div><span class="lbl">Parent ASIN</span> <span class="val">'+esc(amzCl.parent_asin)+'</span></div>';
      ids += '<div><a href="https://www.amazon.in/dp/'+(amzCl.channel_sku_id||'')+'" target="_blank">View on Amazon &rarr;</a></div>';
    }
    if(p.ean_code) ids += '<div><span class="lbl">EAN</span> <span class="val">'+esc(p.ean_code)+'</span></div>';
    if(p.category) ids += '<div><span class="lbl">Category</span> <span class="val">'+esc(p.category)+'</span></div>';
    if(p.is_parent) ids += '<div><span class="pd-status active" style="margin:6px 0 0">PARENT MSKU</span></div>';
    document.getElementById('pd-ids').innerHTML = ids;
  }

  /* ─────────── ALERTS ─────────── */
  function renderAlerts(anomalies){
    var el = document.getElementById('pd-alerts');
    if(!anomalies || !anomalies.length){ el.style.display='none'; return; }
    el.innerHTML = anomalies.map(function(a){
      return '<div class="pd-alert '+a.severity+'">'+(a.severity==='red'?'&#9888;':'&#9432;')+' '+esc(a.message)+'</div>';
    }).join('');
  }

  /* ─────────── SALES ─────────── */
  function renderSales(d){
    var sk = d.sales_kpis || {};
    document.getElementById('sales-sub').textContent = d.listing_snapshot && d.listing_snapshot.snapshot_date
      ? 'Last updated: '+d.listing_snapshot.snapshot_date : '';

    // Multi-period KPI grid (combined across channels)
    if(sk['7d'] || sk['30d'] || sk['90d']){
      var html = '<div class="kpi-periods">';
      ['7d','30d','90d'].forEach(function(period){
        var k = sk[period] || {};
        var label = period === '7d' ? 'Last 7 days' : period === '30d' ? 'Last 30 days' : 'Last 90 days';
        html += '<div class="kpi-period">';
        html += '<div class="per-label">'+label+'</div>';
        html += perRow('Units ordered', fmt(k.units));
        html += perRow('Revenue', cur(k.revenue));
        html += perRow('Orders', fmt(k.orders));
        html += perRow('Avg selling price', k.asp != null ? cur(k.asp) : '--');
        html += '</div>';
      });
      html += '</div>';
      document.getElementById('sales-kpis').innerHTML = html;
    }

    // Channel breakdown (below the combined KPIs)
    renderChannelBreakdown(d.sales_trend);

    // BSR
    var snap = d.listing_snapshot || {};
    if(snap.bsr){
      var cat = d.product.category || d.product.category_normalised || '';
      document.getElementById('sales-bsr').innerHTML =
        '<div style="margin-bottom:4px;font-size:11px;color:var(--t3)">Best Sellers Rank</div>' +
        '<span class="bsr-badge">#'+fmt(snap.bsr)+(cat ? ' in '+esc(cat) : '')+'</span>';
    }

    // Sales chart
    renderSalesChart(d.sales_trend);

    // Hide the table container (no daily table)
    document.getElementById('sales-table').style.display = 'none';
  }

  function renderChannelBreakdown(trend){
    if(!trend || !trend.length) return;
    // Aggregate by channel
    var byCh = {};
    trend.forEach(function(r){
      if(!byCh[r.channel]) byCh[r.channel] = {revenue:0, units:0, orders:0};
      byCh[r.channel].revenue += r.revenue||0;
      byCh[r.channel].units += r.units||0;
      byCh[r.channel].orders += r.orders||0;
    });
    var channels = Object.keys(byCh);
    if(channels.length <= 1) return; // no breakdown needed for single channel

    var totalRev = channels.reduce(function(a,ch){ return a + byCh[ch].revenue; }, 0);
    var chNames = {AMAZON_IN:'Amazon',SHOPIFY:'Shopify',FLIPKART_IN:'Flipkart',MYNTRA:'Myntra'};
    var chColors = {AMAZON_IN:'#FF9900',SHOPIFY:'#96bf48',FLIPKART_IN:'#2874f0',MYNTRA:'#ff3f6c'};

    var html = '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--bg-cream)">';
    html += '<div style="font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;font-weight:600;margin-bottom:10px">Channel Breakdown</div>';

    // Stacked bar
    if(totalRev > 0){
      html += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:10px">';
      channels.forEach(function(ch){
        var pctW = byCh[ch].revenue / totalRev * 100;
        if(pctW > 0) html += '<div style="width:'+pctW.toFixed(1)+'%;background:'+(chColors[ch]||'#999')+'"></div>';
      });
      html += '</div>';
    }

    // Per-channel row
    html += '<div style="display:grid;grid-template-columns:repeat('+Math.min(channels.length,4)+',1fr);gap:12px">';
    channels.forEach(function(ch){
      var c = byCh[ch];
      var share = totalRev > 0 ? (c.revenue/totalRev*100).toFixed(0)+'%' : '--';
      html += '<div style="font-size:12px">';
      html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">';
      html += '<span style="width:8px;height:8px;border-radius:2px;background:'+(chColors[ch]||'#999')+'"></span>';
      html += '<span style="font-weight:600;color:var(--t1)">'+(chNames[ch]||ch)+'</span>';
      html += '<span style="font-size:10px;color:var(--t3)">'+share+'</span>';
      html += '</div>';
      html += '<div style="color:var(--t2)">'+cur(c.revenue)+' &middot; '+fmt(c.units)+' units</div>';
      html += '</div>';
    });
    html += '</div></div>';

    // Append after the KPIs
    document.getElementById('sales-kpis').innerHTML += html;
  }

  function renderSalesChart(trend){
    var el = document.getElementById('sales-chart');
    if(!trend || !trend.length){ el.style.display='none'; return; }

    // Aggregate by date (combined)
    var byDate = {};
    trend.forEach(function(r){
      if(!byDate[r.date]) byDate[r.date] = 0;
      byDate[r.date] += r.revenue || 0;
    });
    var dates = Object.keys(byDate).sort();
    var vals = dates.map(function(d){ return byDate[d]; });
    if(!vals.length){ el.style.display='none'; return; }

    var maxV = Math.max.apply(null, vals) || 1;
    var w = 100, h = 100;
    var padX = 2, padY = 10;
    var points = vals.map(function(v, i){
      var x = padX + (i / Math.max(vals.length-1, 1)) * (w - 2*padX);
      var y = padY + (1 - v/maxV) * (h - 2*padY);
      return x.toFixed(1)+','+y.toFixed(1);
    });
    var polyline = points.join(' ');
    var area = padX+','+h+' '+polyline+' '+(padX + ((vals.length-1)/Math.max(vals.length-1,1))*(w-2*padX)).toFixed(1)+','+h;

    var svg = '<svg class="chart-svg" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">';
    svg += '<polygon points="'+area+'" fill="rgba(59,130,246,0.08)" />';
    svg += '<polyline points="'+polyline+'" fill="none" stroke="#3B82F6" stroke-width="0.5" />';
    svg += '<circle cx="'+points[points.length-1].split(',')[0]+'" cy="'+points[points.length-1].split(',')[1]+'" r="1" fill="#3B82F6" />';
    svg += '</svg>';
    svg += '<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:10px;color:var(--t3)">';
    svg += '<span>'+shortD(dates[0])+'</span>';
    svg += '<span style="color:var(--t1);font-weight:600">'+cur(vals[vals.length-1])+'</span>';
    svg += '<span>'+shortD(dates[dates.length-1])+'</span>';
    svg += '</div>';
    el.innerHTML = svg;
  }

  /* ─────────── PRICING ─────────── */
  function renderPricing(d){
    var snap = d.listing_snapshot || {};
    var p = d.product;
    var lh = d.listing_health && d.listing_health[0];

    document.getElementById('pricing-sub').textContent = snap.snapshot_date ? 'Last updated: '+snap.snapshot_date : '';

    var html = '<div class="price-grid">';

    // Left: current settings
    html += '<div class="price-col"><h4>Current Settings</h4>';
    html += priceRow('Your price today', snap.selling_price != null ? cur(snap.selling_price) : (lh && lh.amz_price != null ? cur(lh.amz_price) : '--'));
    html += priceRow('MRP', p.mrp != null ? cur(p.mrp) : '--');
    html += priceRow('COGS', p.cogs != null ? cur(p.cogs) : '--');
    if(p.weight_grams) html += priceRow('Weight', p.weight_grams+'g');

    // Shopify price if available
    if(lh && lh.shp_price != null){
      html += priceRow('Shopify price', cur(lh.shp_price));
      if(lh.price_mismatch){
        html += '<div style="font-size:11px;color:var(--a);margin-top:6px">&#9888; Price mismatch &gt;10% between channels</div>';
      }
    }
    html += '</div>';

    // Right: marketplace signals
    html += '<div class="price-col"><h4>Marketplace Signals</h4>';
    html += priceRow('Featured Offer (Buy Box)', snap.buy_box_pct != null ? '<span class="val green">'+pct(snap.buy_box_pct,0)+'</span>' : '--', true);
    html += priceRow('Rating', snap.rating != null ? snap.rating+' / 5' : '--');
    html += priceRow('Reviews', snap.review_count ? fmt(snap.review_count) : '--');
    if(snap.bsr) html += priceRow('BSR', '#'+fmt(snap.bsr));
    html += '</div>';

    html += '</div>';
    document.getElementById('pricing-content').innerHTML = html;
  }

  /* ─────────── INVENTORY ─────────── */
  function renderInventory(d){
    var inv = d.inventory || [];
    var t = d.inventory_total || {};
    if(!inv.length){
      document.getElementById('inv-content').innerHTML = '<div class="empty">No inventory data</div>';
      return;
    }

    document.getElementById('inv-sub').textContent = inv[0].snapshot_date ? 'Last updated: '+inv[0].snapshot_date : '';

    var html = '<div class="inv-grid">';

    // Col 1: Product info
    html += '<div class="inv-col"><h4>Product</h4>';
    if(d.product.weight_grams) html += invRow('Weight', d.product.weight_grams+'g');
    var totalStock = t.fulfillable + t.reserved + t.inbound + t.unfulfillable;
    html += invRow('Total in FBA', fmt(totalStock));
    // Rough days of supply from 7d sales
    var sk7 = d.sales_kpis && d.sales_kpis['7d'];
    if(sk7 && sk7.units > 0){
      var dailyVel = sk7.units / 7;
      var dos = Math.round(t.fulfillable / dailyVel);
      html += invRow('Days of supply', dos+'d', dos < 14);
    }
    html += '</div>';

    // Col 2: FBA breakdown
    html += '<div class="inv-col"><h4>FBA Inventory Breakdown</h4>';
    html += invRow('Total', fmt(totalStock));
    html += invRow('Available', fmt(t.fulfillable), t.fulfillable === 0);
    html += invRow('Inbound', fmt(t.inbound));
    html += invRow('Reserved', fmt(t.reserved));
    html += invRow('Unfulfillable', fmt(t.unfulfillable), t.unfulfillable > 0);
    html += '</div>';

    // Col 3: Per-ASIN (if multiple)
    if(inv.length > 1){
      html += '<div class="inv-col"><h4>Per ASIN</h4>';
      inv.forEach(function(r){
        html += invRow(r.asin||r.seller_sku, fmt(r.fulfillable)+' avail');
      });
      html += '</div>';
    } else {
      html += '<div class="inv-col"><h4>Details</h4>';
      html += invRow('ASIN', inv[0].asin||'--');
      html += invRow('SKU', inv[0].seller_sku||'--');
      html += invRow('FC', inv[0].fc_id||'--');
      html += '</div>';
    }

    html += '</div>';
    document.getElementById('inv-content').innerHTML = html;
  }

  /* ─────────── P&L / SKU ECONOMICS ─────────── */
  function renderPnL(d){
    var pnl = d.pnl;
    if(!pnl || !pnl.net_revenue){
      document.getElementById('pnl-content').innerHTML = '<div class="empty">No P&L data for this period</div>';
      return;
    }
    document.getElementById('pnl-sub').textContent = 'Last '+d.days+' days';

    // Waterfall bar chart
    var items = [
      {label:'Revenue', val:pnl.net_revenue, pos:true},
      {label:'Commission', val:pnl.commission},
      {label:'Fulfillment', val:pnl.fulfilment_cost},
      {label:'Shipping', val:pnl.shipping_cost},
      {label:'COGS', val:pnl.cogs},
      {label:'Ad Spend', val:pnl.ad_spend},
      {label:'CM3', val:pnl.cm, pos:pnl.cm > 0},
    ];
    var maxAbs = Math.max.apply(null, items.map(function(i){ return Math.abs(i.val||0); })) || 1;

    var html = '<div class="wf-bar">';
    items.forEach(function(i){
      var v = Math.abs(i.val||0);
      var h = Math.max(v / maxAbs * 100, 3);
      var cls = i.pos ? 'pos' : (i.val > 0 ? 'pos' : 'neg');
      if(i.label === 'CM3') cls = i.val >= 0 ? 'pos' : 'neg';
      html += '<div class="wf-col"><div class="wf-amt">'+cur(i.val)+'</div><div class="bar '+cls+'" style="height:'+h+'%"></div><div class="wf-lbl">'+i.label+'</div></div>';
    });
    html += '</div>';

    // KPI row
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0">';
    html += kpiTile('CM%', pnl.cm_pct != null ? pct(pnl.cm_pct,1) : '--', pnl.cm_pct >= 0 ? 'var(--g)' : 'var(--r)');
    html += kpiTile('TACoS', pnl.tacos != null ? pct(pnl.tacos,1) : '--');
    html += kpiTile('Units Sold', fmt(pnl.units_sold));
    html += kpiTile('Refunded', fmt(pnl.units_refunded));
    html += '</div>';

    // Trend table
    if(d.pnl_trend && d.pnl_trend.length){
      html += '<table class="dt" style="font-size:12px;margin-top:14px"><thead><tr><th>Date</th><th class="r">Revenue</th><th class="r">CM</th><th class="r">CM%</th></tr></thead><tbody>';
      d.pnl_trend.slice(-14).forEach(function(r){
        html += '<tr><td>'+shortD(r.date)+'</td><td class="r">'+cur(r.revenue)+'</td><td class="r">'+cur(r.cm)+'</td><td class="r">'+(r.cm_pct!=null?pct(r.cm_pct,1):'--')+'</td></tr>';
      });
      html += '</tbody></table>';
    }

    document.getElementById('pnl-content').innerHTML = html;
  }

  /* ─────────── ADS ─────────── */
  function renderAds(d){
    document.getElementById('ads-sub').textContent = 'Last '+d.days+' days';
    var html = '<div class="ads-grid">';
    d.ads.forEach(function(a){
      html += '<div class="ad-card"><div class="ad-type">'+esc(a.ad_type)+'</div>';
      html += adRow('Spend', cur(a.spend));
      html += adRow('Clicks', fmt(a.clicks));
      html += adRow('Impressions', fmt(a.impressions));
      html += adRow('CTR', a.ctr!=null?pct(a.ctr,2):'--');
      html += adRow('ACoS', a.acos!=null?pct(a.acos,1):'--');
      html += adRow('ROAS', a.roas!=null?a.roas.toFixed(2)+'x':'--');
      html += adRow('Attr. Sales', cur(a.attr_sales));
      html += '</div>';
    });
    html += '</div>';

    if(d.ads_trend && d.ads_trend.length){
      html += '<table class="dt" style="font-size:12px"><thead><tr><th>Date</th><th class="r">Spend</th><th class="r">Clicks</th><th class="r">Attr. Sales</th><th class="r">ACoS</th></tr></thead><tbody>';
      d.ads_trend.slice(-14).forEach(function(r){
        var acos = r.attr_sales > 0 ? (r.spend/r.attr_sales*100).toFixed(1)+'%' : '--';
        html += '<tr><td>'+shortD(r.date)+'</td><td class="r">'+cur(r.spend)+'</td><td class="r">'+fmt(r.clicks)+'</td><td class="r">'+cur(r.attr_sales)+'</td><td class="r">'+acos+'</td></tr>';
      });
      html += '</tbody></table>';
    }
    document.getElementById('ads-content').innerHTML = html;
  }

  /* ─────────── SERP ─────────── */
  function renderSERP(serp){
    var h = '<table class="dt" style="font-size:12px"><thead><tr><th>Keyword</th><th class="r">Rank</th><th class="r">Sponsored</th><th class="r">Rating</th><th class="r">Reviews</th><th>Updated</th></tr></thead><tbody>';
    serp.forEach(function(r){
      var cls = !r.position?'none':r.position<=3?'top':r.position<=10?'ok':'low';
      h += '<tr><td>'+esc(r.keyword)+'</td><td class="r"><span class="rk '+cls+'">'+(r.position||'--')+'</span></td><td class="r">'+(r.is_sponsored?'Yes':'--')+'</td><td class="r">'+(r.rating!=null?r.rating.toFixed(1):'--')+'</td><td class="r">'+fmt(r.review_count)+'</td><td style="font-size:11px;color:var(--t3)">'+shortD(r.date)+'</td></tr>';
    });
    h += '</tbody></table>';
    document.getElementById('serp-content').innerHTML = h;
  }

  /* ─────────── REVIEWS ─────────── */
  function renderReviews(d){
    var html = '';
    if(d.review_summary && d.review_summary.total > 0){
      var s = d.review_summary;
      document.getElementById('reviews-sub').textContent = s.total+' reviews';
      html += '<div class="rv-header">';
      html += '<div><div class="rv-avg">'+s.avg_rating.toFixed(1)+'</div><div class="rv-avg-sub">out of 5</div></div>';
      html += '<div class="rv-bars">';
      for(var i=5;i>=1;i--){
        var cnt=s.distribution[i]||0;
        var pctW=s.total>0?(cnt/s.total*100):0;
        html += '<div class="rv-bar-row"><span class="star">'+i+'</span><div class="bar"><div class="fill" style="width:'+pctW+'%"></div></div><span class="cnt">'+cnt+'</span></div>';
      }
      html += '</div></div>';
    }
    (d.reviews||[]).forEach(function(r){
      html += '<div class="rv-card"><div class="rv-card-head"><span class="rv-stars">'+stars(r.rating)+'</span>';
      if(r.verified) html += '<span style="font-size:10px;color:var(--g);font-weight:500">Verified</span>';
      if(r.date) html += '<span class="rv-card-date">'+shortD(r.date)+'</span>';
      html += '</div>';
      if(r.title) html += '<div class="rv-card-title">'+esc(r.title)+'</div>';
      if(r.text) html += '<div class="rv-card-body">'+esc(r.text)+'</div>';
      if(r.themes && r.themes.length){
        html += '<div class="rv-themes">';
        r.themes.forEach(function(t){ html += '<span class="rv-theme">'+esc(t)+'</span>'; });
        html += '</div>';
      }
      html += '</div>';
    });
    document.getElementById('reviews-content').innerHTML = html || '<div class="empty">No reviews</div>';
  }

  /* ─────────── RETURNS ─────────── */
  function renderReturns(d){
    document.getElementById('returns-sub').textContent = d.returns_total_units+' units returned ('+d.days+'d)';
    var h = '<table class="dt" style="font-size:12px"><thead><tr><th>Reason</th><th>Type</th><th>Condition</th><th class="r">Units</th><th class="r">Refund</th></tr></thead><tbody>';
    d.returns.forEach(function(r){
      h += '<tr><td>'+esc(r.reason||'--')+'</td><td>'+esc(r.type||'--')+'</td><td>'+esc(r.condition||'--')+'</td><td class="r">'+fmt(r.units)+'</td><td class="r">'+cur(r.refund_amount)+'</td></tr>';
    });
    h += '</tbody></table>';
    document.getElementById('returns-content').innerHTML = h;
  }

  /* ─────────── CONTENT HEALTH ─────────── */
  function renderContentHealth(lhList){
    var html = '';
    lhList.forEach(function(lh){
      html += '<div style="margin-bottom:14px">';
      if(lh.seller_sku) html += '<div style="font-family:var(--mono);font-size:11px;color:var(--t3);margin-bottom:6px">'+esc(lh.seller_sku)+(lh.amz_asin?' &middot; '+esc(lh.amz_asin):'')+'</div>';
      if(lh.content_score != null){
        var cs = lh.content_score;
        var csColor = cs >= 80 ? 'var(--g)' : cs >= 50 ? 'var(--a)' : 'var(--r)';
        html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">';
        html += '<span style="font-family:var(--mono);font-size:18px;font-weight:700;color:'+csColor+'">'+cs+'%</span>';
        html += '<div style="flex:1"><div class="cs-bar"><div class="cs-fill" style="width:'+cs+'%;background:'+csColor+'"></div></div></div>';
        html += '</div>';
      }
      html += '<div style="display:flex;gap:20px;font-size:12px;color:var(--t2)">';
      html += '<span>'+(lh.image_count||0)+' images</span>';
      html += '<span>'+(lh.bullet_count||0)+' bullets</span>';
      html += '<span>'+(lh.has_description?'Has description':'No description')+'</span>';
      html += '</div>';
      html += '</div>';
    });
    document.getElementById('content-health').innerHTML = html;
  }

  /* ─────────── VARIANTS ─────────── */
  function renderVariants(variants){
    var h = '<table class="var-tbl"><thead><tr><th></th><th>Channel</th><th>Seller SKU</th><th>ASIN/ID</th><th>Fulfillment</th><th>Status</th></tr></thead><tbody>';
    variants.forEach(function(v){
      h += '<tr>';
      h += '<td>'+(v.image_url?'<img class="vi" src="'+v.image_url+'">':'')+'</td>';
      h += '<td>'+chLabel(v.channel)+'</td>';
      h += '<td style="font-family:var(--mono);font-size:11px">'+esc(v.seller_sku||'--')+'</td>';
      h += '<td style="font-family:var(--mono);font-size:11px">'+esc(v.channel_sku_id||'--')+'</td>';
      h += '<td>'+(v.fulfilment||'--')+'</td>';
      h += '<td><span class="pd-status '+(v.is_active?'active':'inactive')+'">'+(v.is_active?'Active':'Inactive')+'</span></td>';
      h += '</tr>';
    });
    h += '</tbody></table>';
    document.getElementById('variants-content').innerHTML = h;
  }

  /* ─────────── HELPERS ─────────── */
  function esc(s){ return String(s||'').replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function chLabel(ch){ return {AMAZON_IN:'Amazon IN',SHOPIFY:'Shopify',FLIPKART_IN:'Flipkart',MYNTRA:'Myntra',MEESHO:'Meesho'}[ch]||ch; }
  function stars(n){ var s=''; for(var i=0;i<5;i++) s+=i<n?'&#9733;':'&#9734;'; return s; }
  function perRow(lbl,val){ return '<div class="per-row"><span class="lbl">'+lbl+'</span><span class="val">'+val+'</span></div>'; }
  function priceRow(lbl,val,raw){ return '<div class="price-row"><span class="lbl">'+lbl+'</span><span class="val">'+(raw?val:val)+'</span></div>'; }
  function invRow(lbl,val,warn){ return '<div class="inv-row"><span class="lbl">'+lbl+'</span><span class="val'+(warn?' warn':'')+'">'+val+'</span></div>'; }
  function adRow(lbl,val){ return '<div class="ad-row"><span class="lbl">'+lbl+'</span><span class="val">'+val+'</span></div>'; }
  function kpiTile(label,val,color){
    return '<div style="background:var(--bg-cream);border-radius:var(--rad);padding:10px 12px;text-align:center">'
      +'<div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px">'+label+'</div>'
      +'<div style="font-family:var(--mono);font-size:16px;font-weight:600;'+(color?'color:'+color:'color:var(--t1)')+'">'+val+'</div></div>';
  }
